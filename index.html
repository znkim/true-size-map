<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>True Size Map Demo</title>
  </head>
  <body>
    <div id="app">
      <div id="map" class="map"></div>
      <aside class="info-panel">
        <h1>True Size Map Demo</h1>
        <p>국가 폴리곤을 드래그해 위도에 따른 크기 변화를 확인하세요.</p>
        <dl>
          <div>
            <dt>원래 위도</dt>
            <dd id="origin-lat">-</dd>
          </div>
          <div>
            <dt>현재 위도</dt>
            <dd id="current-lat">-</dd>
          </div>
          <div>
            <dt>Scale</dt>
            <dd id="scale-value">-</dd>
          </div>
        </dl>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
